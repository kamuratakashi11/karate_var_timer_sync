<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空手BAR 中央監視ダッシュボード</title>
<style>
  body {
    margin: 0; background: #0d0d0d; color: #eee;
    font-family: -apple-system, "Hiragino Sans", sans-serif;
    padding: 20px;
  }
  h1 { font-size: 20px; color: #aaa; margin-bottom: 20px; }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card {
    border-radius: 10px; padding: 18px; background: #1a1a1a;
    border-left: 8px solid #555;
  }
  .card.ok { border-left-color: #2ecc71; }
  .card.ng { border-left-color: #e74c3c; }
  .card.offline { border-left-color: #7f8c8d; background: #151515; }
  .court-name { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
  .state-label { font-size: 14px; margin-bottom: 6px; }
  .state-label.ok { color: #2ecc71; }
  .state-label.ng { color: #e74c3c; }
  .state-label.offline { color: #7f8c8d; }
  .detail { font-size: 12px; color: #888; line-height: 1.6; }
  #updated { color: #666; font-size: 12px; margin-top: 20px; }
</style>
</head>
<body>
  <h1>空手BAR 中央監視ダッシュボード(録画死活状態のみ・映像は扱いません)</h1>
  <div id="grid"></div>
  <div id="updated">最終更新: --</div>

<script>
async function refresh() {
  try {
    const res = await fetch('/api/all_status');
    const courts = await res.json();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    courts.forEach(c => {
      const card = document.createElement('div');
      let stateClass, stateLabel;
      if (!c.online) {
        stateClass = 'offline'; stateLabel = '● 接続不可';
      } else if (c.recording_ok) {
        stateClass = 'ok'; stateLabel = '● 録画中';
      } else {
        stateClass = 'ng'; stateLabel = '● 録画停止';
      }
      card.className = 'card ' + stateClass;
      const age = c.last_frame_age_sec !== null && c.last_frame_age_sec !== undefined
        ? c.last_frame_age_sec.toFixed(1) + '秒前' : '--';
      const uptime = c.uptime_sec !== null && c.uptime_sec !== undefined
        ? Math.floor(c.uptime_sec / 60) + '分' : '--';
      card.innerHTML = `
        <div class="court-name">${c.court_config_name}</div>
        <div class="state-label ${stateClass}">${stateLabel}</div>
        <div class="detail">
          最終フレーム: ${age}<br>
          稼働時間: ${uptime}<br>
          ${c.message ? c.message : ''}
        </div>
      `;
      grid.appendChild(card);
    });
    document.getElementById('updated').textContent =
      '最終更新: ' + new Date().toLocaleTimeString('ja-JP');
  } catch (e) {
    console.error(e);
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
